<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    
    <div class="wrapper">

        <h1>Weather App</h1>
        <div class="tab-container">
            <p class="tab" data-userWeather>Your Weather</p>
            <p class="tab" data-searchWeather >Search Weather</p>
        </div>
        
        <div class="weather-container">

            <!-- grant location container -->
            <div class="sub-container grant-location-container">
                <img src="images/location.png" alt="location" class="location-icon" width="80" height="80" loading="lazy"  />
                <p>Grant Location Access</p>
                <p>Allow Access to get Weather Information</p>
                <button class="btn" data-grantAccess>Grant Access</button>
            </div>

            <!-- search bar -->
             <form class="form-container" data-searchForm>
                <input type="text" placeholder="Search for a city..." data-searchInput />
                <button class="btn" type="submit">
                    <img src="images/search.png" alt="search" class="search-icon" width="20" height="20" loading="lazy" />
                </button>
             </form>

            <!-- loading screen container -->
            <div class="sub-container loading-container" data-loading>
                <img src="images/loading.gif" alt="loading" class="loading-icon" width="150" height="150" loading="lazy" />  
                <p>Loading...</p>
            </div>

            <!-- weather info container -->
            <div class=" sub-container user-info-container">
                <!-- city name and country icon -->
                <div class="name">
                    <p data-cityName></p>
                    <img data-countryIcon/>
                </div>
                <!-- weather description -->
                <p data-weatherDesc></p>

                <!-- weather icon -->
                <img data-weatherIcon/>

                <!-- temperature -->
                <p data-temp></p>

                

                <!--3 cards parameters-->
                <div class="parameter-container">

                    <!-- card 1 -->
                    <div class="parameter">
                        <img src="images/wind.png"/>
                        <p class="parameter-name">Wind Speed</p>
                        <p class="parameter-value" data-windSpeed></p>
                    </div>

                    <!-- card 2 -->
                    <div class="parameter">
                        <img src="images/humidity.png"/>
                        <p class="parameter-name">Humidity</p>
                        <p class="parameter-value" data-humidity></p>
                    </div>

                    <!-- card 3 -->
                    <div class="parameter">
                        <img src="images/cloud.png"/>
                        <p class="parameter-name">Clouds</p>
                        <p class="parameter-value" data-cloudiness></p>
                    </div>
                </div>
            </div>
 
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
